name: Bug report
description: Report a reproducible problem in the skill, workflow template, or live view.
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal steps, command, event fixture, or workflow configuration.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, screenshots, or generated HTML snippets. Do not paste secrets or private source packets.
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Commit or version
      description: Commit SHA, branch, or release tag.
    validations:
      required: false
